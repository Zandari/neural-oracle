<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="chat">
    <div class="chat__container">
        <div class="chat__header">
            <h1 class="chat__title">Neural Oracle 🔮</h1>
            <button class="chat__logout-button" type="button">Logout</button>
        </div>
        <div class="chat__messages">
        </div>
        <div class="chat__compose">
            <form class="chat__input-form">
                <input class="chat__input" type="text" maxlength="500" placeholder="Type your message..." autocomplete="off">
                <button class="chat__send-button" type="submit">Send</button>
            </form>
            <div class="chat__input-meta">
                <span class="chat__char-count">0 / 500</span>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
